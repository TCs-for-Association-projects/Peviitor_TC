# AUTO-GENERATED — edit config/epics-and-stories.json and re-run:
#   node scripts/generate-template.js
# Do NOT hand-edit this file.

name: Test Case
description: Create a structured QA test case linked to an Epic and User Story
title: "[TC]: "
labels: ["Test_Case"]

body:

  # ── Guidelines & Quick Reference ───────────────────────────────────────────
  - type: markdown
    attributes:
      value: |
        > **📖 Before you start** — search existing test cases to avoid duplicates.
        > Need help? See the [QA Notion Guide](https://brave-mandevilla-652.notion.site/QA-Guide-Asociatia-Oportunitati-si-Cariere-1ae185f480ff801db946d012460e564b).

        <details>
        <summary><strong>📋 Authoring &amp; Execution Guide — click to expand</strong></summary>

        #### ✏️ Title format
        `TC - [Feature] - [Action] - [Expected Result]`
        > Example: `TC - Footer links - Hover and click - Correct pages open`

        ---

        #### 🏷️ Epic / User Story matching
        Pick the **Epic** first, then the matching **User Story**. US options are prefixed with the Epic code (`F1 · US1`) so you can match them easily. If they don't match, the bot flags the issue with `needs-review`.

        ---

        #### ⚡ Executing a test (for testers)
        **Do not edit the issue body after creation.** Use **comment slash-commands** instead:

        | Command | What it does |
        |---|---|
        | `/status passed` | ✅ Mark as passed |
        | `/status failed #123` | ❌ Mark as failed + link bug |
        | `/status blocked` | 🟡 Mark as blocked |
        | `/status partially-passed` | 🟠 Partial pass |
        | `/bug #123` | 🐛 Link or update the related bug |
        | `/cross-os` | Toggle cross-OS flag |
        | `/cross-browser` | Toggle cross-browser flag |

        The bot will reply with a formatted summary and sync all labels automatically.

        ---

        #### ✅ Step writing tips
        - One expected result per step — use checkboxes
        - Steps must be **repeatable** by someone who didn't write them
        - Keep steps atomic: one action = one step

        </details>

  # ── 🏷️ Traceability ───────────────────────────────────────────────────────
  - type: markdown
    attributes:
      value: |
        ---
        ## 🏷️ Traceability
        > Link this test case to its Epic and User Story for tracking.

  - type: dropdown
    id: epic
    attributes:
      label: Epic
      description: "Select the Epic this test case belongs to."
      options:
      - "Epic E1 (#11)"
      - "Epic E2 (#13)"
      - "Epic E3 (#14)"
      - "Epic E4 (#15)"
      - "Epic E5 (#16)"
      - "Epic E6: Displaying job results (#20)"
      - "Epic E7 (#22)"
      - "Epic E8 (#29)"
      - "Epic E9 (#32)"
      - "Epic E10 (#39)"
      - "Epic E11 (#45)"
    validations:
      required: true

  - type: dropdown
    id: user_story
    attributes:
      label: User Story
      description: "Options are prefixed with the Epic code — pick the one matching your Epic."
      options:
      - "E1 · US1: As a _ I want so I can _ (#5)"
      - "E1 · US2: As a _ ,I waant to (#6)"
      - "E1 · US3: As a __, I want to __ (#7)"
      - "E5 · US4: As a user, I want to see important navigation links in the footer, so that I can easily access key pages. (#17)"
      - "E5 · US5: As a user, I want the footer to be clearly structured so that I can easily find the information I need. (#18)"
      - "E5 · US6: As a user with accessibility needs, I want to navigate the footer using assistive technologies so that I can access all links without barriers. (#19)"
      - "E6 · US7: As a user, I want to see a list of relevant jobs after performing a search, so that I can quickly identify suitable opportunities. (#21)"
      - "E7 · US8: As a user, I want to be able to filter listings by city, so that I can see only the jobs available in the location that interests me. (#23)"
      - "E7 · US9: As a user, I want to be able to filter listings by company, so that I can see only the jobs posted by a specific employer. (#24)"
      - "E7 · US10: As a user, I want to be able to filter listings by work mode (e.g. Fizic, Hybrid, La distanta), so that I can see only the jobs that match my work preferences. (#25)"
      - "E5 · US11: As a user, I want the footer to be consistent across all pages, so that I have a uniform experience. (#26)"
      - "E5 · US12: As a user, I want the footer to always be visible at the bottom of the page, so that I can access it easily. (#27)"
      - "E5 · US13: As a user, I want a quick way to go back to the top of the page from the footer, so that I save time. (#28)"
      - "E8 · US14: As a user, I want to search for jobs using different criteria so that I can see job listings matching my criteria. (#30)"
      - "E9 · US15: As a user, I want to access Politica de confidentialitate and Conditii de utilizare from the footer, so that I understand how my data is used. (#33)"
      - "E9 · US16: As a user, I want to see copyright information in the footer, so that I know who owns the platform. (#34)"
      - "E9 · US17: As a user, I want to see information about the organization behind the platform, so that I can trust the service. (#35)"
      - "E5 · US18: As a website user, I want to see social media icons in the footer so that I can easily find the company's social profiles. (#36)"
      - "E5 · US19: As a website user, I want to click on social media icons so that I can access the company's social media pages. (#37)"
      - "E5 · US20: As a website user, I want to see tooltips on social media icons so that I understand where each link leads. (#38)"
      - "E10 · US21: As a user, I want the footer to render correctly in all supported browsers so that I have a consistent visual experience. (#40)"
      - "E10 · US22: As a user, I want all footer links to function correctly across different browsers so that I can navigate without issues. (#41)"
      - "E10 · US23: As a user, I want the footer to behave consistently across browsers so that interactions feel the same everywhere. (#42)"
      - "E10 · US24: As a user, I want the footer to display correctly on different devices so that I can have a consistent experience regardless of screen size. (#43)"
      - "E10 · US25: As a user, I want the website footer to function correctly across different operating systems so that I can have a consistent experience regardless of the platform I use. (#44)"
      - "E11 · US26: As a user, I want the footer to follow the same visual style as the rest of the website so that the interface feels consistent. (#46)"
      - "E11 · US27: As a user, I want the footer content to have a clear visual hierarchy so that I can quickly understand the most important information. (#47)"
      - "E11 · US28: As a user, I want all footer icons and links to have consistent styling so that the interface looks clean and professional. (#48)"
    validations:
      required: true

  # ── 📝 Test Definition ────────────────────────────────────────────────────
  - type: markdown
    attributes:
      value: |
        ---
        ## 📝 Test Definition
        > Describe what this test case verifies and any setup needed.

  - type: input
    id: tc_summary
    attributes:
      label: Summary
      description: "One-line title in TC format."
      placeholder: "TC – Footer links – Hover and click – Correct pages open"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: "What is being verified and why?"
      placeholder: "Verifies that all footer navigation links redirect to the correct pages on peviitor.ro."
    validations:
      required: true

  - type: textarea
    id: preconditions
    attributes:
      label: Preconditions
      description: "Optional. Any setup required before running this test."
      placeholder: |
        - Browser open, navigated to peviitor.ro
        - User is not logged in

  - type: textarea
    id: test_data
    attributes:
      label: Test Data
      description: "Optional. Input values, credentials, or datasets needed."
      placeholder: |
        - Search term: 'developer'
        - City: 'Cluj-Napoca'

  - type: dropdown
    id: testing_type
    attributes:
      label: Testing Type
      description: "What kind of testing does this case cover?"
      options:
      - "Navigation"
      - "Content testing"
      - "GUI and usability"
      - "Performance testing"
      - "Compatibility testing"
      - "Accessibility testing"
      - "Regression"
      - "Edge case"
    validations:
      required: true

  - type: dropdown
    id: website_section
    attributes:
      label: Website Section
      description: "Which part of peviitor.ro does this target?"
      options:
      - "Header"
      - "Footer"
      - "Search bar"
      - "Filters"
      - "Job listings"
      - "Job details"
      - "Navigation"
      - "Other"
    validations:
      required: true

  # ── 💻 Environment ────────────────────────────────────────────────────────
  - type: markdown
    attributes:
      value: |
        ---
        ## 💻 Environment
        > Where and how will this test be executed?

  - type: dropdown
    id: test_context
    attributes:
      label: Test Environment
      description: "Where will this test be executed?"
      options:
      - "Local"
      - "Staging"
      - "Production"
    validations:
      required: true

  - type: textarea
    id: env_details
    attributes:
      label: Environment Details
      description: "OS, browser, resolution, device — one per line."
      value: |
        OS: Windows 11
        Browser: Chrome 120
        Resolution: 1920x1080
        Device:
    validations:
      required: true

  - type: checkboxes
    id: cross_flags
    attributes:
      label: Cross-platform Coverage
      description: "Tick any that apply. The executor can toggle these later with /cross-os or /cross-browser."
      options:
        - label: "Should be run across multiple operating systems"
        - label: "Should be run across multiple browsers"

  # ── 🪜 Steps & Expected Results ───────────────────────────────────────────
  - type: markdown
    attributes:
      value: |
        ---
        ## 🪜 Steps & Expected Results
        > Write clear, repeatable steps. One expected result per step. Use checkboxes so the executor can mark them.

  - type: textarea
    id: test_steps
    attributes:
      label: Test Steps
      description: "One expected result per step. The executor will check off each result while running."
      value: |
        **Step 1.** [Describe the action]
        - [ ] Expected: [What should happen]

        **Step 2.** [Describe the action]
        - [ ] Expected: [What should happen]

        **Step 3.** [Describe the action]
        - [ ] Expected: [What should happen]

        **Step 4.** [Describe the action]
        - [ ] Expected: [What should happen]
    validations:
      required: true

  # ── ✅ Final Check ─────────────────────────────────────────────────────────
  - type: markdown
    attributes:
      value: |
        ---
        ## ✅ Final Check
        > ⚡ **Reminder:** After this test case is created, use **comment slash-commands** (`/status passed`, `/bug #123`, etc.) to record execution results — do not edit the issue body.

  - type: checkboxes
    id: quality_check
    attributes:
      label: Confirm before submitting
      options:
        - label: "Steps are clear and repeatable."
          required: true
        - label: "Epic and User Story match."
          required: true
