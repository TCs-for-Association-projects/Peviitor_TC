name: Generate Test Case Template

on:
  push:
    branches: [main]
    paths:
      - "config/epics-and-stories.json"
      - "scripts/generate-template.js"
      - ".github/workflows/Generate_Template.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Regenerate test_case.yml
        run: node scripts/generate-template.js

      - name: Validate YAML syntax
        run: |
          python3 -c "import yaml, sys; yaml.safe_load(open('.github/ISSUE_TEMPLATE/test_case.yml')); print('YAML OK')"

      - name: Commit updated template if changed
        run: |
          if git diff --quiet .github/ISSUE_TEMPLATE/test_case.yml; then
            echo "No changes to test_case.yml — skipping commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/ISSUE_TEMPLATE/test_case.yml
          git commit -m "chore: regenerate test_case.yml from config"
          git push